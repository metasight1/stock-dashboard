name: Update Stock Data

on:
  schedule:
    # 한국시간 매주 월요일 오전 7시 = UTC 일요일 22:00
    - cron: '0 22 * * 0'
    # 한국시간 매주 목요일 오전 7시 = UTC 수요일 22:00
    - cron: '0 22 * * 3'
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write  # data.json 자동 커밋 권한

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run filter script
        # Alpha Vantage API 키는 GitHub Secrets에서 환경변수로 주입한다.
        # (저장소 Settings → Secrets and variables → Actions 에 ALPHA_VANTAGE_API_KEY 등록)
        # Secret이 없으면 스크립트가 자동으로 yfinance 컨센서스로 폴백한다.
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: python scripts/update_data.py

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          if git diff --staged --quiet; then
            echo "data.json에 변경 없음 - 커밋 건너뜀"
          else
            git commit -m "Auto-update stock data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
